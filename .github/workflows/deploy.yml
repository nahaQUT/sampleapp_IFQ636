name: CI/CD Pipeline - Online Podcast Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────
  # JOB 1: CI - Install & Test
  # ─────────────────────────────────
  build:
    name: CI - Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────
  # JOB 2: CD - Deploy to EC2
  # ─────────────────────────────────
  deploy:
    name: CD - Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/sampleapp_IFQ636
            git pull origin main
            cd backend
            npm install
            cd ../frontend
            npm install
            npm run build
            pm2 restart backend || pm2 start backend/server.js --name backend
            pm2 save
```

---

### Save the file `Ctrl + S`

---

### Now add GitHub Secrets:

These are the EC2 credentials GitHub needs to SSH into your server.

1. Go to `github.com/liperdio/sampleapp_IFQ636`
2. Click **"Settings"** tab
3. Click **"Secrets and variables"** → **"Actions"**
4. Click **"New repository secret"**

Add these 3 secrets one by one:

| Secret Name | Value |
|---|---|
| `EC2_HOST` | Your EC2 public IP address |
| `EC2_USER` | `ubuntu` |
| `EC2_KEY` | Your EC2 private key (.pem file contents) |

---

### To get your EC2_KEY value:

Open your `.pem` file in VS Code or Notepad and copy **everything** including:
```
-----BEGIN RSA PRIVATE KEY-----
...
-----END RSA PRIVATE KEY-----