name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18]

    environment: MONGO_URI

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Print Env Secret
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: ${{ secrets.PORT }}
      run: |
        echo "MONGO_URI is set: $MONGO_URI"
        echo "JWT_SECRET is set: $JWT_SECRET"
        echo "PORT is set: $PORT"

    - name: Stop Running Services
      run: pm2 stop all || true

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: |
        npm install --global yarn
        yarn --version
        yarn install

    - name: Install Frontend Dependencies and Build
      working-directory: ./frontend
      run: |
        df -h
        sudo rm -rf ./build
        yarn install
        yarn run build

    - name: Run Backend Tests
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: ${{ secrets.PORT }}
      working-directory: ./backend
      run: npm test

    - name: Install Root Dependencies
      run: npm ci

    - name: Create .env File
      run: |
        cd ./backend
        touch .env
        echo "${{ secrets.PROD }}" > .env

    - name: Start Services
      run: |
        cd ./backend
        pm2 start server.js --name "courier-cms" || true
        cd ../frontend
        pm2 serve build/ 3000 --name "Frontend" --spa || true
        pm2 save

    - name: Restart Services
      run: pm2 restart all
