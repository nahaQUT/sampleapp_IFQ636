name: Deploy

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: self-hosted

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '22'

            - name: Install dependencies
              run: npm run install-all

            - name: Stop existing app
              run: pm2 stop all || true

            - name: Start backend
              run: |
                  cd backend
                  pm2 start server.js --name backend

            - name: Build frontend
              run: |
                  cd frontend
                  npm run build

            - name: Restart PM2
              run: pm2 save